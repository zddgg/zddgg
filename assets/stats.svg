<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 320" width="640" height="320" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="sbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#010409"/>
    </linearGradient>
    <filter id="sglow"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>

  <rect width="640" height="320" rx="12" fill="url(#sbg)" stroke="#1f2937"/>

  <!-- title bar -->
  <rect width="640" height="36" rx="12" fill="#161b22"/>
  <rect y="24" width="640" height="12" fill="#161b22"/>
  <circle cx="22" cy="18" r="6" fill="#ff5f56"/>
  <circle cx="42" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="62" cy="18" r="6" fill="#27c93f"/>
  <text x="320" y="23" font-size="13" fill="#64748b" text-anchor="middle" font-family="'JetBrains Mono',monospace">zddgg@github — bash</text>

  <!-- prompt lines -->
  <text x="24" y="78" fill="#22d3ee" font-size="14" font-family="'JetBrains Mono',monospace">$ whoami</text>
  <text x="24" y="100" fill="#a78bfa" font-size="14" font-family="'JetBrains Mono',monospace">→ zddgg · Full Stack Developer</text>

  <text x="24" y="132" fill="#22d3ee" font-size="14" font-family="'JetBrains Mono',monospace">$ stats --live</text>

  <text x="24" y="150" fill="#64748b" font-size="14" font-family="'JetBrains Mono',monospace">repos</text><text x="180" y="150" fill="#e2e8f0" font-size="14" font-family="'JetBrains Mono',monospace">12</text>
  <text x="24" y="176" fill="#64748b" font-size="14" font-family="'JetBrains Mono',monospace">stars</text><text x="180" y="176" fill="#e2e8f0" font-size="14" font-family="'JetBrains Mono',monospace">175</text>
  <text x="24" y="202" fill="#64748b" font-size="14" font-family="'JetBrains Mono',monospace">followers</text><text x="180" y="202" fill="#e2e8f0" font-size="14" font-family="'JetBrains Mono',monospace">9</text>
  <text x="24" y="228" fill="#64748b" font-size="14" font-family="'JetBrains Mono',monospace">years_active</text><text x="180" y="228" fill="#e2e8f0" font-size="14" font-family="'JetBrains Mono',monospace">8y</text>

  <!-- blinking cursor -->
  <text x="24" y="262" fill="#22d3ee" font-size="14" font-family="'JetBrains Mono',monospace">$</text>
  <rect x="40" y="250" width="9" height="16" fill="#22d3ee">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>