<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 280" width="920" height="280" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="gbg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#0a0e1a"/>
    </linearGradient>
    <filter id="gglow"><feGaussianBlur stdDeviation="4"/></filter>
  </defs>

  <rect width="920" height="280" fill="url(#gbg)"/>
  <text x="20" y="30" font-size="12" fill="#475569" font-family="'JetBrains Mono',monospace">// request flow</text>

  <!-- client -> gateway (flowing) -->
  <line x1="120" y1="160" x2="370" y2="160" stroke="#1f6feb" stroke-width="2" stroke-dasharray="8 6">
    <animate attributeName="stroke-dashoffset" values="0;-28" dur="1s" repeatCount="indefinite"/>
  </line>

  <!-- client node -->
  <g transform="translate(80,160)">
    <circle r="40" fill="#0d1117" stroke="#a78bfa" stroke-width="2"/>
    <circle r="40" fill="none" stroke="#a78bfa" stroke-width="2" opacity="0.5">
      <animate attributeName="r" values="40;52;40" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <text y="5" font-size="12" fill="#c4b5fd" text-anchor="middle" font-family="'JetBrains Mono',monospace">CLIENT</text>
  </g>

  <!-- gateway node -->
  <g transform="translate(420,160)">
    <rect x="-50" y="-34" width="100" height="68" rx="10" fill="#0d1117" stroke="#22d3ee" stroke-width="2" filter="url(#gglow)" opacity="0.9"/>
    <rect x="-50" y="-34" width="100" height="68" rx="10" fill="none" stroke="#22d3ee" stroke-width="2"/>
    <text y="-4" font-size="13" fill="#67e8f9" text-anchor="middle" font-family="'JetBrains Mono',monospace">API</text>
    <text y="14" font-size="13" fill="#67e8f9" text-anchor="middle" font-family="'JetBrains Mono',monospace">GATEWAY</text>
    <circle cx="0" cy="0" r="3" fill="#22c55e">
      <animate attributeName="opacity" values="1;0.2;1" dur="0.7s" repeatCount="indefinite"/>
    </circle>
  </g>


    <line x1="480" y1="160" x2="720" y2="60" stroke="#334155" stroke-width="1.5" stroke-dasharray="6 6">
      <animate attributeName="stroke-dashoffset" values="0;-24" dur="0.8s" repeatCount="indefinite"/>
    </line>
    <g transform="translate(760,60)">
      <circle r="6" fill="#22d3ee">
        <animate attributeName="r" values="6;9;6" dur="1.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="1;0.5;1" dur="1.5s" repeatCount="indefinite"/>
      </circle>
      <rect x="10" y="-14" width="90" height="28" rx="6" fill="#0d1117" stroke="#1f6feb"/>
      <text x="55" y="4" font-size="12" fill="#93c5fd" text-anchor="middle" font-family="'JetBrains Mono',monospace">auth.svc</text>
    </g>

    <line x1="480" y1="160" x2="720" y2="120" stroke="#334155" stroke-width="1.5" stroke-dasharray="6 6">
      <animate attributeName="stroke-dashoffset" values="0;-24" dur="1s" repeatCount="indefinite"/>
    </line>
    <g transform="translate(760,120)">
      <circle r="6" fill="#22d3ee">
        <animate attributeName="r" values="6;9;6" dur="1.8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="1;0.5;1" dur="1.8s" repeatCount="indefinite"/>
      </circle>
      <rect x="10" y="-14" width="90" height="28" rx="6" fill="#0d1117" stroke="#1f6feb"/>
      <text x="55" y="4" font-size="12" fill="#93c5fd" text-anchor="middle" font-family="'JetBrains Mono',monospace">user.svc</text>
    </g>

    <line x1="480" y1="160" x2="720" y2="180" stroke="#334155" stroke-width="1.5" stroke-dasharray="6 6">
      <animate attributeName="stroke-dashoffset" values="0;-24" dur="1.2000000000000002s" repeatCount="indefinite"/>
    </line>
    <g transform="translate(760,180)">
      <circle r="6" fill="#22d3ee">
        <animate attributeName="r" values="6;9;6" dur="2.1s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="1;0.5;1" dur="2.1s" repeatCount="indefinite"/>
      </circle>
      <rect x="10" y="-14" width="90" height="28" rx="6" fill="#0d1117" stroke="#1f6feb"/>
      <text x="55" y="4" font-size="12" fill="#93c5fd" text-anchor="middle" font-family="'JetBrains Mono',monospace">order.svc</text>
    </g>

    <line x1="480" y1="160" x2="720" y2="240" stroke="#334155" stroke-width="1.5" stroke-dasharray="6 6">
      <animate attributeName="stroke-dashoffset" values="0;-24" dur="1.4000000000000001s" repeatCount="indefinite"/>
    </line>
    <g transform="translate(760,240)">
      <circle r="6" fill="#22d3ee">
        <animate attributeName="r" values="6;9;6" dur="2.4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="1;0.5;1" dur="2.4s" repeatCount="indefinite"/>
      </circle>
      <rect x="10" y="-14" width="90" height="28" rx="6" fill="#0d1117" stroke="#1f6feb"/>
      <text x="55" y="4" font-size="12" fill="#93c5fd" text-anchor="middle" font-family="'JetBrains Mono',monospace">pay.svc</text>
    </g>

  <text x="900" y="265" font-size="10" fill="#334155" text-anchor="end" font-family="'JetBrains Mono',monospace">edge · resilient · observable</text>
</svg>